services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: memory
      POSTGRES_DB: memory_layer
    ports:
      - '5432:5432'
    volumes:
      - ./src/adapters/postgres/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U memory -d memory_layer']
      interval: 5s
      timeout: 5s
      retries: 5

  memory-layer:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MEMORY_TRANSPORT: http
      MEMORY_HOST: 0.0.0.0
      MEMORY_PORT: 3100
      MEMORY_DATABASE_URL: postgres://memory:memory@postgres:5432/memory_layer
      MEMORY_SCOPE: hosted
      MEMORY_QUALITY_MODE: high_fidelity_memory
      MEMORY_CROSS_SCOPE_LEVEL: workspace
    ports:
      - '3100:3100'

volumes:
  pgdata:
