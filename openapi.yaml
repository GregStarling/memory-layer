openapi: 3.1.0
info:
  title: memory-layer HTTP API
  version: 2.0.0
  description: HTTP surface for the memory-layer standalone AI memory service.
servers:
  - url: http://localhost:3100
tags:
  - name: ingestion
  - name: retrieval
  - name: episodic
  - name: cognitive
  - name: profiles
  - name: playbooks
  - name: associations
  - name: maintenance
  - name: observability
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
    adminKey:
      type: apiKey
      in: header
      name: x-admin-key
  parameters:
    Query:
      name: query
      in: query
      schema:
        type: string
    ScopeTenant:
      name: tenant_id
      in: query
      schema:
        type: string
    ScopeSystem:
      name: system_id
      in: query
      schema:
        type: string
    ScopeWorkspace:
      name: workspace_id
      in: query
      schema:
        type: string
    ScopeCollaboration:
      name: collaboration_id
      in: query
      schema:
        type: string
    ScopeId:
      name: scope_id
      in: query
      schema:
        type: string
    ScopeLevel:
      name: scope_level
      in: query
      schema:
        type: string
        enum: [scope, workspace, system, tenant]
    Since:
      name: since
      in: query
      schema:
        type: string
        format: date-time
    EventTypes:
      name: event_types
      in: query
      schema:
        type: string
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
    Association:
      type: object
      required: [id, tenant_id, system_id, workspace_id, collaboration_id, scope_id, source_kind, source_id, target_kind, target_id, association_type, confidence, auto_generated, created_at]
      properties:
        id:
          type: integer
        tenant_id:
          type: string
        system_id:
          type: string
        workspace_id:
          type: string
        collaboration_id:
          type: string
        scope_id:
          type: string
        source_kind:
          type: string
          enum: [knowledge, playbook, working_memory, work_item]
        source_id:
          type: integer
        target_kind:
          type: string
          enum: [knowledge, playbook, working_memory, work_item]
        target_id:
          type: integer
        association_type:
          type: string
          enum: [related_to, supports, contradicts, supersedes, depends_on, solves, applies_to, derived_from]
        confidence:
          type: number
        auto_generated:
          type: boolean
        created_at:
          type: integer
    MemoryEvent:
      type: object
      required: [type, scope, timestamp, durationMs, meta]
      properties:
        type:
          type: string
        scope:
          $ref: '#/components/schemas/Scope'
        timestamp:
          type: integer
        durationMs:
          type: integer
        meta:
          type: object
          additionalProperties: true
    Scope:
      type: object
      required: [tenant_id, system_id, scope_id]
      properties:
        tenant_id:
          type: string
        system_id:
          type: string
        workspace_id:
          type: string
        collaboration_id:
          type: string
        scope_id:
          type: string
    ActorRef:
      type: object
      required: [actor_kind, actor_id]
      properties:
        actor_kind:
          type: string
          enum: [agent, human, system, service]
        actor_id:
          type: string
        system_id:
          type: string
          nullable: true
        display_name:
          type: string
          nullable: true
        metadata:
          type: object
          nullable: true
          additionalProperties: true
    WorkClaim:
      type: object
      required: [id, work_item_id, actor, claim_token, status, claimed_at, expires_at, visibility_class, version]
      properties:
        id:
          type: integer
        work_item_id:
          type: integer
        actor:
          $ref: '#/components/schemas/ActorRef'
        session_id:
          type: string
          nullable: true
        claim_token:
          type: string
        status:
          type: string
          enum: [active, released, expired]
        claimed_at:
          type: integer
        expires_at:
          type: integer
        released_at:
          type: integer
          nullable: true
        release_reason:
          type: string
          nullable: true
        source_event_id:
          type: integer
          nullable: true
        visibility_class:
          type: string
          enum: [private, shared_collaboration, workspace, tenant]
        version:
          type: integer
    HandoffRecord:
      type: object
      required: [id, work_item_id, from_actor, to_actor, summary, status, created_at, visibility_class, version]
      properties:
        id:
          type: integer
        work_item_id:
          type: integer
        from_actor:
          $ref: '#/components/schemas/ActorRef'
        to_actor:
          $ref: '#/components/schemas/ActorRef'
        session_id:
          type: string
          nullable: true
        summary:
          type: string
        context_bundle_ref:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, accepted, rejected, canceled, expired]
        created_at:
          type: integer
        accepted_at:
          type: integer
          nullable: true
        rejected_at:
          type: integer
          nullable: true
        canceled_at:
          type: integer
          nullable: true
        expires_at:
          type: integer
          nullable: true
        decision_reason:
          type: string
          nullable: true
        source_event_id:
          type: integer
          nullable: true
        visibility_class:
          type: string
          enum: [private, shared_collaboration, workspace, tenant]
        version:
          type: integer
    CoordinationState:
      type: object
      required: [ownedClaims, pendingInboundHandoffs, pendingOutboundHandoffs, sharedWorkItems]
      properties:
        ownedClaims:
          type: array
          items:
            $ref: '#/components/schemas/WorkClaim'
        pendingInboundHandoffs:
          type: array
          items:
            $ref: '#/components/schemas/HandoffRecord'
        pendingOutboundHandoffs:
          type: array
          items:
            $ref: '#/components/schemas/HandoffRecord'
        sharedWorkItems:
          type: array
          items:
            type: object
    TurnRequest:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
        actor:
          type: string
        scope:
          $ref: '#/components/schemas/Scope'
    ExchangeRequest:
      type: object
      required: [userContent, assistantContent]
      properties:
        userContent:
          type: string
        assistantContent:
          type: string
        scope:
          $ref: '#/components/schemas/Scope'
    FactRequest:
      type: object
      required: [fact, factType]
      properties:
        fact:
          type: string
        factType:
          type: string
          enum: [preference, identity, project, constraint, procedure, entity, other]
        confidence:
          type: string
          enum: [high, medium, low]
          default: high
        scope:
          $ref: '#/components/schemas/Scope'
    WorkRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
        kind:
          type: string
          enum: [objective, unresolved_work, constraint]
          default: objective
        status:
          type: string
          enum: [open, in_progress, blocked, done]
          default: open
        detail:
          type: string
        visibility_class:
          type: string
          enum: [private, shared_collaboration, workspace, tenant]
        scope:
          $ref: '#/components/schemas/Scope'
    CompactRequest:
      type: object
      properties:
        scope:
          $ref: '#/components/schemas/Scope'
    ContextResponse:
      type: object
      properties:
        currentObjective:
          type: string
          nullable: true
        sessionState:
          type: object
          nullable: true
          properties:
            currentObjective:
              type: string
              nullable: true
            blockers:
              type: array
              items:
                type: string
            assumptions:
              type: array
              items:
                type: string
            pendingDecisions:
              type: array
              items:
                type: string
            activeTools:
              type: array
              items:
                type: string
            recentOutputs:
              type: array
              items:
                type: string
            updatedAt:
              type: integer
        activeTurnCount:
          type: integer
        workingMemory:
          type: object
          nullable: true
          properties:
            summary:
              type: string
            key_entities:
              type: array
              items:
                type: string
            topic_tags:
              type: array
              items:
                type: string
        relevantKnowledge:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              fact:
                type: string
              fact_type:
                type: string
              confidence:
                type: string
        activeObjectives:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
              status:
                type: string
        unresolvedWork:
          type: array
          items:
            type: string
        debugTrace:
          type: object
          nullable: true
        coordinationState:
          type: object
          nullable: true
        tokenEstimate:
          type: integer
    SearchResponse:
      type: object
      properties:
        turns:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              role:
                type: string
              content:
                type: string
              rank:
                type: number
        knowledge:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              fact:
                type: string
              fact_type:
                type: string
              rank:
                type: number
    HealthResponse:
      type: object
      properties:
        activeTurnCount:
          type: integer
        tokenEstimate:
          type: integer
        knowledgeCount:
          type: integer
        objectiveCount:
          type: integer
        unresolvedWorkCount:
          type: integer
        sessionStateUpdatedAt:
          type: integer
        circuitBreakers:
          type: object
    TemporalEventLogResponse:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/TemporalEventRecord'
        nextCursor:
          type: integer
          nullable: true
    TemporalEventRecord:
      type: object
      required: [event_id, entity_kind, entity_id, event_type, payload, created_at]
      properties:
        event_id:
          type: integer
        tenant_id:
          type: string
        system_id:
          type: string
        workspace_id:
          type: string
        collaboration_id:
          type: string
        scope_id:
          type: string
        session_id:
          type: string
          nullable: true
        actor_id:
          type: string
          nullable: true
        actor_kind:
          type: string
          nullable: true
        actor_system_id:
          type: string
          nullable: true
        actor_display_name:
          type: string
          nullable: true
        actor_metadata:
          type: object
          nullable: true
          additionalProperties: true
        entity_kind:
          type: string
        entity_id:
          type: string
        event_type:
          type: string
        payload:
          type: object
          additionalProperties: true
        causation_id:
          type: string
          nullable: true
        correlation_id:
          type: string
          nullable: true
        created_at:
          type: integer
    TemporalStateResponse:
      type: object
      required: [asOf, exact, cutoverAt, watermarkEventId, context, turns, workingMemory, knowledge, workItems, associations, playbooks, workClaims, handoffs]
      properties:
        asOf:
          type: integer
        exact:
          type: boolean
        cutoverAt:
          type: integer
          nullable: true
        watermarkEventId:
          type: integer
          nullable: true
        context:
          $ref: '#/components/schemas/ContextResponse'
        sessionState:
          type: object
          nullable: true
        turns:
          type: array
          items:
            type: object
        workingMemory:
          type: array
          items:
            type: object
        knowledge:
          type: array
          items:
            type: object
        workItems:
          type: array
          items:
            type: object
        associations:
          type: array
          items:
            type: object
        playbooks:
          type: array
          items:
            type: object
        workClaims:
          type: array
          items:
            $ref: '#/components/schemas/WorkClaim'
        handoffs:
          type: array
          items:
            $ref: '#/components/schemas/HandoffRecord'
        coordinationState:
          type: object
          nullable: true
    TemporalStateDiffResponse:
      type: object
      required: [from, to, exact, cutoverAt, watermarkRange, events, summary]
      properties:
        from:
          type: integer
        to:
          type: integer
        exact:
          type: boolean
        cutoverAt:
          type: integer
          nullable: true
        watermarkRange:
          type: object
        events:
          type: array
          items:
            $ref: '#/components/schemas/TemporalEventRecord'
        summary:
          type: object
    ReadyResponse:
      type: object
      properties:
        ok:
          type: boolean
        scopes:
          type: integer
    EpisodeSourceReference:
      type: object
      required: [type, id, excerpt]
      properties:
        type:
          type: string
          enum: [turn, working_memory, knowledge]
        id:
          type: integer
        excerpt:
          type: string
          nullable: true
    EpisodeRecap:
      type: object
      required: [objective, actions, outcomes, artifacts, unresolvedItems, sourceType, sources]
      properties:
        objective:
          type: string
        actions:
          type: array
          items:
            type: string
        outcomes:
          type: array
          items:
            type: string
        artifacts:
          type: array
          items:
            type: string
        unresolvedItems:
          type: array
          items:
            type: string
        sourceType:
          type: string
          enum: [episodic, declarative, mixed]
        sources:
          type: array
          items:
            $ref: '#/components/schemas/EpisodeSourceReference'
    EpisodeSummary:
      type: object
      required: [sessionId, recap, detailLevel, turnRange, createdAt]
      properties:
        sessionId:
          type: string
        recap:
          $ref: '#/components/schemas/EpisodeRecap'
        detailLevel:
          type: string
          enum: [abstract, overview, full]
        turnRange:
          type: object
          required: [start, end]
          properties:
            start:
              type: integer
            end:
              type: integer
        createdAt:
          type: integer
    ReflectResult:
      type: object
      required: [synthesis, sourceType, sources, episodes, detailLevel]
      properties:
        synthesis:
          type: string
        sourceType:
          type: string
          enum: [episodic, declarative, mixed]
        sources:
          type: array
          items:
            $ref: '#/components/schemas/EpisodeSourceReference'
        episodes:
          type: array
          items:
            $ref: '#/components/schemas/EpisodeSummary'
        detailLevel:
          type: string
          enum: [abstract, overview, full]
    CognitiveMemoryItem:
      type: object
      required: [id, type, fact, createdAt, lastAccessedAt, metadata]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [episodic, semantic, procedural, working]
        fact:
          type: string
        createdAt:
          type: integer
        lastAccessedAt:
          type: integer
        metadata:
          type: object
          required: [trustScore, knowledgeClass]
          properties:
            trustScore:
              type: number
            knowledgeClass:
              type: string
            knowledgeState:
              type: string
    CognitiveSearchHit:
      type: object
      required: [item, rank]
      properties:
        item:
          $ref: '#/components/schemas/CognitiveMemoryItem'
        rank:
          type: number
    CognitiveSearchResult:
      type: object
      required: [byType, all]
      properties:
        byType:
          type: object
          required: [episodic, semantic, procedural, working]
          properties:
            episodic:
              type: array
              items:
                $ref: '#/components/schemas/CognitiveSearchHit'
            semantic:
              type: array
              items:
                $ref: '#/components/schemas/CognitiveSearchHit'
            procedural:
              type: array
              items:
                $ref: '#/components/schemas/CognitiveSearchHit'
            working:
              type: array
              items:
                $ref: '#/components/schemas/CognitiveSearchHit'
        all:
          type: array
          items:
            $ref: '#/components/schemas/CognitiveSearchHit'
    ProfileEntry:
      type: object
      required: [knowledgeId, fact, trustScore, knowledgeState, confidence, lastConfirmedAt]
      properties:
        knowledgeId:
          type: integer
        fact:
          type: string
        trustScore:
          type: number
        knowledgeState:
          type: string
          enum: [candidate, provisional, trusted, disputed, superseded, retired]
        confidence:
          type: string
          enum: [high, medium, low]
        lastConfirmedAt:
          type: integer
          nullable: true
    Profile:
      type: object
      required: [view, sections, generatedAt]
      properties:
        view:
          type: string
          enum: [user, operator, workspace]
        sections:
          type: object
          required: [identity, preferences, communication, constraints, workflows]
          properties:
            identity:
              type: array
              items:
                $ref: '#/components/schemas/ProfileEntry'
            preferences:
              type: array
              items:
                $ref: '#/components/schemas/ProfileEntry'
            communication:
              type: array
              items:
                $ref: '#/components/schemas/ProfileEntry'
            constraints:
              type: array
              items:
                $ref: '#/components/schemas/ProfileEntry'
            workflows:
              type: array
              items:
                $ref: '#/components/schemas/ProfileEntry'
        generatedAt:
          type: integer
    Playbook:
      type: object
      required: [id, tenant_id, system_id, workspace_id, collaboration_id, scope_id, title, description, instructions, references, templates, scripts, assets, tags, status, revision_count, use_count, created_at, updated_at, schema_version, visibility_class]
      properties:
        id:
          type: integer
        tenant_id:
          type: string
        system_id:
          type: string
        workspace_id:
          type: string
        collaboration_id:
          type: string
        scope_id:
          type: string
        visibility_class:
          type: string
          enum: [private, shared_collaboration, workspace, tenant]
        title:
          type: string
        description:
          type: string
        instructions:
          type: string
        references:
          type: array
          items:
            type: string
        templates:
          type: array
          items:
            type: string
        scripts:
          type: array
          items:
            type: string
        assets:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [draft, active, deprecated, archived]
        source_session_id:
          type: string
          nullable: true
        source_working_memory_id:
          type: integer
          nullable: true
        revision_count:
          type: integer
        last_used_at:
          type: integer
          nullable: true
        use_count:
          type: integer
        created_at:
          type: integer
        updated_at:
          type: integer
        schema_version:
          type: integer
    NewPlaybookRequest:
      type: object
      required: [title, description, instructions]
      properties:
        title:
          type: string
        description:
          type: string
        instructions:
          type: string
        references:
          type: array
          items:
            type: string
        templates:
          type: array
          items:
            type: string
        scripts:
          type: array
          items:
            type: string
        assets:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [draft, active, deprecated, archived]
        source_session_id:
          type: string
        source_working_memory_id:
          type: integer
        scope:
          $ref: '#/components/schemas/Scope'
    PlaybookRevision:
      type: object
      required: [id, tenant_id, system_id, workspace_id, collaboration_id, scope_id, playbook_id, instructions, revision_reason, created_at]
      properties:
        id:
          type: integer
        tenant_id:
          type: string
        system_id:
          type: string
        workspace_id:
          type: string
        collaboration_id:
          type: string
        scope_id:
          type: string
        playbook_id:
          type: integer
        instructions:
          type: string
        revision_reason:
          type: string
        source_session_id:
          type: string
          nullable: true
        created_at:
          type: integer
    PlaybookSearchHit:
      type: object
      required: [item, rank]
      properties:
        item:
          $ref: '#/components/schemas/Playbook'
        rank:
          type: number
security:
  - bearerAuth: []
paths:
  /v1/turns:
    post:
      tags: [ingestion]
      summary: Store a single turn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TurnRequest'
      responses:
        '201':
          description: Turn stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  turnId:
                    type: integer
                  role:
                    type: string
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/exchanges:
    post:
      tags: [ingestion]
      summary: Store a user and assistant exchange
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExchangeRequest'
      responses:
        '201':
          description: Exchange stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  userTurnId:
                    type: integer
                  assistantTurnId:
                    type: integer
                  compacted:
                    type: boolean
  /v1/context:
    get:
      tags: [retrieval]
      summary: Assemble prompt-ready context
      parameters:
        - $ref: '#/components/parameters/Query'
        - name: view
          in: query
          schema:
            type: string
            enum: [local_only, local_plus_shared_collaboration, operator_supervisor, workspace_shared]
        - name: include_coordination
          in: query
          schema:
            type: boolean
        - $ref: '#/components/parameters/ScopeTenant'
        - $ref: '#/components/parameters/ScopeSystem'
        - $ref: '#/components/parameters/ScopeWorkspace'
        - $ref: '#/components/parameters/ScopeCollaboration'
        - $ref: '#/components/parameters/ScopeId'
      responses:
        '200':
          description: Assembled context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContextResponse'
  /v1/state:
    get:
      tags: [retrieval]
      summary: Get temporal state at a unix timestamp
      parameters:
        - name: as_of
          in: query
          required: true
          schema:
            type: integer
        - $ref: '#/components/parameters/Query'
        - name: view
          in: query
          schema:
            type: string
            enum: [local_only, local_plus_shared_collaboration, operator_supervisor, workspace_shared]
        - name: include_coordination
          in: query
          schema:
            type: boolean
        - $ref: '#/components/parameters/ScopeTenant'
        - $ref: '#/components/parameters/ScopeSystem'
        - $ref: '#/components/parameters/ScopeWorkspace'
        - $ref: '#/components/parameters/ScopeCollaboration'
        - $ref: '#/components/parameters/ScopeId'
      responses:
        '200':
          description: Temporal state snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemporalStateResponse'
  /v1/timeline:
    get:
      tags: [retrieval]
      summary: List memory events in chronological order
      parameters:
        - name: session_id
          in: query
          schema: { type: string }
        - name: entity_kind
          in: query
          schema: { type: string }
        - name: entity_id
          in: query
          schema: { type: string }
        - name: start_at
          in: query
          schema: { type: integer }
        - name: end_at
          in: query
          schema: { type: integer }
        - name: limit
          in: query
          schema: { type: integer }
        - name: cursor
          in: query
          schema: { type: integer }
        - $ref: '#/components/parameters/ScopeTenant'
        - $ref: '#/components/parameters/ScopeSystem'
        - $ref: '#/components/parameters/ScopeWorkspace'
        - $ref: '#/components/parameters/ScopeCollaboration'
        - $ref: '#/components/parameters/ScopeId'
      responses:
        '200':
          description: Timeline page
          content:
            application/json:
              schema:
