name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test:coverage
      - run: npm run eval:retrieval:enforce
      - run: npm run eval:gate
      - run: npm run eval:memory-quality:enforce
      - run: npm run eval:memory-quality:delta:enforce
      - run: npm run pack:check

  python-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: python -m venv .venv
        working-directory: clients/python
      - run: .venv/bin/pip install -e '.[dev]'
        working-directory: clients/python
      - run: .venv/bin/ruff check .
        working-directory: clients/python
      - run: .venv/bin/pytest
        working-directory: clients/python
      - run: .venv/bin/python -m build
        working-directory: clients/python

  platform-proof:
    runs-on: ubuntu-latest
    needs: [test, python-client]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: npm ci
      - run: npm run python:check
      - run: npm run eval:platform-quality:enforce
