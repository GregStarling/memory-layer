name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npx tsc -p examples/tsconfig.json
      - run: npm run test:coverage
      # Benchmark regression check (Phase 5.5, D7): warn-only, never fails CI.
      # Timing is machine-dependent; the compare script always exits 0 and
      # surfaces >20% regressions vs the checked-in results as annotations.
      - run: npm run benchmark:compare
        continue-on-error: true
      - run: npm run eval:retrieval:enforce
      - run: npm run eval:gate
      - run: npm run eval:memory-quality:enforce
      - run: npm run eval:memory-quality:delta:enforce
      - run: npm run pack:check

  python-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: python -m venv .venv
        working-directory: clients/python
      - run: .venv/bin/pip install -e '.[dev]'
        working-directory: clients/python
      - run: .venv/bin/ruff check .
        working-directory: clients/python
      - run: .venv/bin/pytest
        working-directory: clients/python
      - run: .venv/bin/python -m build
        working-directory: clients/python

  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: memory_layer_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d memory_layer_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_TEST_URL: postgres://postgres:postgres@localhost:5432/memory_layer_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      # Coverage-instrumented single pass (Phase 5.3, D5): runs every pg-gated
      # suite exactly once — vitest.postgres.config.ts's include list is the
      # single source of truth for what executes here — and reports (not yet
      # enforces) src/adapters/postgres/** coverage; ratchet thresholds in
      # after the first measured run.
      - run: npm run test:postgres:coverage

  platform-proof:
    runs-on: ubuntu-latest
    needs: [test, python-client, postgres-integration]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: npm ci
      - run: npm run python:check
      - run: npm run eval:platform-quality:enforce
