name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (for example v3.0.0)
        required: true
        type: string

jobs:
  npm-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run release:check
      - name: Publish to npm (skip if version exists)
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null; then
            echo "${PKG_NAME}@${PKG_VERSION} already published — skipping"
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  python-client:
    if: github.repository == 'GregStarling/memory-layer'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: python -m venv .venv
        working-directory: clients/python
      - run: .venv/bin/pip install -e '.[dev]'
        working-directory: clients/python
      - run: .venv/bin/ruff check .
        working-directory: clients/python
      - run: .venv/bin/pytest
        working-directory: clients/python
      - run: .venv/bin/python -m build
        working-directory: clients/python
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: clients/python/dist
          skip-existing: true

  github-release:
    runs-on: ubuntu-latest
    needs: [npm-package, python-client]
    if: always() && needs.npm-package.result == 'success' && (needs.python-client.result == 'success' || needs.python-client.result == 'skipped')
    permissions:
      contents: write
    env:
      RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: node scripts/extract-changelog-release.mjs "${RELEASE_TAG#v}" > release-notes.md
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: release-notes.md
